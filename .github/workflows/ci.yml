name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gridnull
          POSTGRES_PASSWORD: gridnull
          POSTGRES_DB: gridnull
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gridnull"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://gridnull:gridnull@localhost:5432/gridnull
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: test-secret-for-ci
      AUTH_DISABLED: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run build -w @gridnull/db

      - run: npm run db:migrate:deploy

      - run: npm test

      - run: npm run lint

      - run: npm run build -w @gridnull/web
