name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: triage_ops
          POSTGRES_PASSWORD: triage_ops
          POSTGRES_DB: triage_ops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U triage_ops"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://triage_ops:triage_ops@localhost:5432/triage_ops
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: test-secret-for-ci
      AUTH_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run db:generate

      - run: npm run db:migrate:deploy

      - run: npm test

      - run: npm run lint

      - run: npm run build -w @triage-ops/web
