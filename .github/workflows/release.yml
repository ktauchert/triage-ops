name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version without v prefix (e.g. 0.1.0-rc1)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/ktauchert

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/gridnull-web:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/gridnull-web:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/gridnull-worker:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/gridnull-worker:latest

  release-bundle:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - uses: actions/checkout@v6

      - name: Assemble install bundle
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
        run: |
          BUNDLE_DIR="gridnull-install-${VERSION}"
          mkdir -p "${BUNDLE_DIR}"

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{REGISTRY}}/ghcr.io\/ktauchert/g" \
            install/docker-compose.prod.yml.template \
            > "${BUNDLE_DIR}/docker-compose.prod.yml"

          sed "s/{{VERSION}}/${VERSION}/g" install/.env.example > "${BUNDLE_DIR}/.env.example"
          cp install/install.md "${BUNDLE_DIR}/install.md"
          cp install/LICENSE.txt "${BUNDLE_DIR}/LICENSE.txt"
          cp install/EULA.md "${BUNDLE_DIR}/EULA.md"
          cp install/PRIVACY.md "${BUNDLE_DIR}/PRIVACY.md"

          zip -r "gridnull-install-${VERSION}.zip" "${BUNDLE_DIR}"
          ls -la "gridnull-install-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', needs.build-and-push.outputs.version) || github.ref_name }}
          name: Gridnull ${{ needs.build-and-push.outputs.version }}
          generate_release_notes: true
          files: gridnull-install-${{ needs.build-and-push.outputs.version }}.zip
          body: |
            ## Container images

            - `${{ env.IMAGE_PREFIX }}/gridnull-web:${{ needs.build-and-push.outputs.version }}`
            - `${{ env.IMAGE_PREFIX }}/gridnull-worker:${{ needs.build-and-push.outputs.version }}`

            ## Install

            1. Download `gridnull-install-${{ needs.build-and-push.outputs.version }}.zip`
            2. Follow `install.md` inside the bundle
            3. `docker login ghcr.io` with your read token

            ## Upgrade (existing installs)

            ```bash
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate
            docker compose -f docker-compose.prod.yml --profile production up -d
            ```
