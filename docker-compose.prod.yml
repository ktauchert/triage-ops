# Gridnull production install — pull pre-built images only (no build:).
# Set GRIDNULL_VERSION in .env (see .env.production.example).
# First install: pull → up infra → migrate → up production profile.

name: gridnull

services:
  postgres:
    image: postgres:16-alpine
    container_name: gridnull-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gridnull}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gridnull}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gridnull} -d ${POSTGRES_DB:-gridnull}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gridnull-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:0.30.10
    container_name: gridnull-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  web:
    image: ${GRIDNULL_REGISTRY:-ghcr.io/ktauchert}/gridnull-web:${GRIDNULL_VERSION:?set GRIDNULL_VERSION}
    container_name: gridnull-web
    restart: unless-stopped
    profiles:
      - production
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gridnull}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gridnull}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${GRIDNULL_REGISTRY:-ghcr.io/ktauchert}/gridnull-worker:${GRIDNULL_VERSION:?set GRIDNULL_VERSION}
    container_name: gridnull-worker
    restart: unless-stopped
    profiles:
      - production
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gridnull}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gridnull}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_HOST: http://ollama:11434
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    image: ${GRIDNULL_REGISTRY:-ghcr.io/ktauchert}/gridnull-worker:${GRIDNULL_VERSION:?set GRIDNULL_VERSION}
    container_name: gridnull-migrate
    profiles:
      - migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gridnull}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gridnull}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy", "--schema", "packages/db/prisma/schema.prisma"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
